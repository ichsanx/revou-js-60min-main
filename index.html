<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RevoU Counter App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-pink-soft: #fce4ec;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-pink-100 via-pink-200 to-rose-200">

    <!-- Card glassmorphism -->
    <div class="flex flex-col items-center gap-4 px-8 py-6 rounded-2xl shadow-xl"
         style="background: rgba(255,255,255,0.35); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.5);">

        <!-- Judul -->
        <h1 class="text-lg font-bold text-pink-500 tracking-wide">✨ Counter App</h1>

        <!-- Angka counter -->
        <p id="counter"
           class="text-5xl font-extrabold w-24 text-center tabular-nums drop-shadow-md" style="color: #db2777;">
            0
        </p>

        <!-- Tombol + dan - -->
        <div class="flex gap-4">
            <!-- Tombol minus -->
            <button id="minusButton"
                    class="w-12 h-12 rounded-xl text-2xl font-bold text-pink-600 shadow-md transition-all duration-200 hover:scale-110 active:scale-95"
                    style="background: rgba(255,255,255,0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.6);">
                −
            </button>

            <!-- Tombol plus -->
            <button id="plusButton"
                    class="w-12 h-12 rounded-xl text-2xl font-bold text-pink-600 shadow-md transition-all duration-200 hover:scale-110 active:scale-95"
                    style="background: rgba(255,255,255,0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.6);">
                +
            </button>
        </div>

        <!-- Tombol reset -->
        <button id="resetButton"
                class="px-6 py-1.5 rounded-lg text-xs font-semibold text-pink-500 shadow-md transition-all duration-200 hover:scale-105 active:scale-95"
                style="background: rgba(255,255,255,0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.6);">
            Reset
        </button>

    </div>

    <script src="./index.js"></script>
</body>
</html>
